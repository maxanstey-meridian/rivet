name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore

      - run: dotnet test --no-restore

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack Rivet.Attributes
        run: dotnet pack Rivet.Attributes -c Release -p:Version=${{ steps.version.outputs.VERSION }} --no-restore -o ./nupkgs

      - name: Pack Rivet.Tool
        run: dotnet pack Rivet.Tool -c Release -p:Version=${{ steps.version.outputs.VERSION }} --no-restore -o ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
